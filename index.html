<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter-Strike 1.6 - Browser Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
            position: fixed;
            top: 0; left: 0;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 10;
            transition: opacity 0.5s ease-out;
            padding: 20px;
        }

        #cs-title {
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 2px 2px 8px #000;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 2px;
        }

        #progress-container {
            width: min(90%, 500px);
            height: 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffcc00;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 0 10px #ffcc00;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffaa00, #ffcc00);
            transition: width 0.2s ease;
        }

        #loading-status {
            margin-top: 15px;
            font-size: 0.95rem;
            text-align: center;
            color: #ccc;
            max-width: 90%;
        }

        #fullscreen-btn {
            display: none;
            margin-top: 25px;
            padding: 14px 36px;
            background: #ffcc00;
            color: #000;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.3s, transform 0.2s;
            letter-spacing: 1px;
        }

        #fullscreen-btn:hover {
            background: #ffaa00;
            transform: scale(1.05);
        }

        #error-msg {
            display: none;
            margin-top: 15px;
            padding: 12px 20px;
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid #ff4444;
            border-radius: 6px;
            color: #ff6666;
            font-size: 0.9rem;
            max-width: 90%;
            text-align: center;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
            margin-bottom: 20px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/xash3d-fwgs@latest/dist/raw.js" crossorigin="anonymous"></script>
    <script src="config.js"></script>
</head>
<body>
    <div id="loading-overlay">
        <div id="cs-title">COUNTER-STRIKE 1.6</div>
        <div class="subtitle">Browser Edition</div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="loading-status">Initializing...</div>
        <button id="fullscreen-btn">▶ PLAY</button>
        <div id="error-msg"></div>
    </div>
    <canvas id="canvas"></canvas>

    <script type="module">
        import JSZip from 'https://cdn.skypack.dev/jszip@3.10.1';

        const loadingStatus = document.getElementById('loading-status');
        const progressBar = document.getElementById('progress-bar');
        const errorMsg = document.getElementById('error-msg');
        const overlay = document.getElementById('loading-overlay');
        const canvas = document.getElementById('canvas');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        function updateStatus(msg) {
            loadingStatus.innerText = msg;
        }

        function updateProgress(percent) {
            progressBar.style.width = Math.min(percent, 100) + "%";
        }

        function showError(msg) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = msg;
            updateStatus('Failed to load');
        }

        // Determine asset URL(s): query param > config > default
        const params = new URLSearchParams(window.location.search);
        const raw = params.get('assets') || window.ASSETS_CONFIG || './valve.zip';
        const ASSETS_URLS = Array.isArray(raw) ? raw : [raw];

        async function fetchAllChunks(urls) {
            const allChunks = [];
            const total = urls.length;
            let loadedChunks = 0;
            for (const url of urls) {
                updateStatus(`Downloading assets (part ${loadedChunks + 1}/${total})...`);
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
                const reader = res.body.getReader();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    allChunks.push(value);
                }
                loadedChunks++;
                updateProgress(5 + Math.floor((loadedChunks / total) * 50));
            }
            return new Blob(allChunks);
        }

        async function main() {
            fullscreenBtn.addEventListener('click', () => {
                if (canvas.requestFullscreen) {
                    canvas.requestFullscreen();
                } else if (canvas.webkitRequestFullscreen) {
                    canvas.webkitRequestFullscreen();
                } else if (canvas.msRequestFullscreen) {
                    canvas.msRequestFullscreen();
                }
            }, { once: false });

            try {
                updateStatus("Fetching game assets...");
                updateProgress(5);

                const blob = await fetchAllChunks(ASSETS_URLS);
                const buffer = await blob.arrayBuffer();
                updateProgress(55);
                updateStatus("Extracting game files...");

                const zip = await JSZip.loadAsync(buffer);
                const files = {};
                const entries = Object.keys(zip.files).filter(p => !zip.files[p].dir);
                let loaded = 0;
                const totalFiles = entries.length;

                await Promise.all(entries.map(async p => {
                    const file = zip.files[p];
                    files[`/rodir/${p}`] = await file.async("uint8array");
                    loaded++;
                    updateProgress(55 + Math.floor((loaded / totalFiles) * 30));
                    updateStatus(`Loading files... (${loaded}/${totalFiles})`);
                }));

                updateProgress(85);
                updateStatus("Initializing game engine...");

                Xash3D({
                    arguments: ['-windowed', '-game', 'cstrike', '+_vgui_menus', '0'],
                    canvas,
                    ctx: canvas.getContext('webgl2', {
                        alpha: false,
                        depth: true,
                        stencil: true,
                        antialias: true,
                        powerPreference: 'high-performance'
                    }),
                    dynamicLibraries: [
                        "filesystem_stdio.wasm",
                        "libref_gles3compat.wasm",
                        "cl_dlls/menu_emscripten_wasm32.wasm",
                        "dlls/cs_emscripten_wasm32.so",
                        "cl_dlls/client_emscripten_wasm32.wasm",
                        "/rwdir/filesystem_stdio.so",
                    ],
                    onRuntimeInitialized: function () {
                        Object.keys(files).forEach(k => {
                            const dir = k.split('/').slice(0, -1).join('/');
                            this.FS.mkdirTree(dir);
                            this.FS.writeFile(k, files[k]);
                        });
                        this.FS.chdir('/rodir');

                        updateProgress(100);
                        updateStatus("Ready! Press PLAY to start.");
                        fullscreenBtn.style.display = 'inline-block';

                        fullscreenBtn.addEventListener('click', () => {
                            overlay.style.opacity = '0';
                            setTimeout(() => overlay.remove(), 500);
                            canvas.style.opacity = '1';
                        }, { once: true });
                    },
                    locateFile: (p) => {
                        switch (p) {
                            case 'xash.wasm':
                                return 'https://cdn.jsdelivr.net/npm/xash3d-fwgs@latest/dist/xash.wasm';
                            case '/rwdir/filesystem_stdio.so':
                            case 'filesystem_stdio.wasm':
                                return 'https://cdn.jsdelivr.net/npm/xash3d-fwgs@latest/dist/filesystem_stdio.wasm';
                            case 'libref_gles3compat.wasm':
                                return 'https://cdn.jsdelivr.net/npm/xash3d-fwgs@latest/dist/libref_gles3compat.wasm';
                            case 'cl_dlls/menu_emscripten_wasm32.wasm':
                                return 'https://cdn.jsdelivr.net/npm/cs16-client@latest/dist/cl_dll/menu_emscripten_wasm32.wasm';
                            case 'dlls/cs_emscripten_wasm32.so':
                                return 'https://cdn.jsdelivr.net/npm/cs16-client@latest/dist/dlls/cs_emscripten_wasm32.so';
                            case 'cl_dlls/client_emscripten_wasm32.wasm':
                                return 'https://cdn.jsdelivr.net/npm/cs16-client@latest/dist/cl_dll/client_emscripten_wasm32.wasm';
                            default:
                                return p;
                        }
                    },
                });
            } catch (e) {
                console.error("Failed to load game:", e);
                showError(e.message || "An unknown error occurred. Check the console for details.");
            }
        }

        main();
    </script>
</body>
</html>
